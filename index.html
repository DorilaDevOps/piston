<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puntos en Diámetros — Visualización Interactiva</title>
<meta name="description" content="Visualización interactiva de puntos oscilando sobre diámetros de un círculo. Controla la velocidad, la cantidad de puntos y alterna entre tema oscuro y claro.">
<meta name="keywords" content="puntos, círculo, diámetros, oscilación, movimiento, visualización, interactivo, canvas, javascript">
<meta name="author" content="OpenCode">
<meta property="og:title" content="Puntos en Diámetros">
<meta property="og:description" content="Visualización interactiva de puntos oscilando sobre diámetros de un círculo.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surface-border: rgba(255,255,255,0.06);
  --text: #e0e0e0;
  --text-dim: rgba(255,255,255,0.7);
  --canvas-bg: #12121a;
  --btn-bg: rgba(255,255,255,0.08);
  --btn-hover: rgba(255,255,255,0.14);
  --circle-line: rgba(255,255,255,0.08);
  --diameter-line: rgba(255,255,255,0.04);
  --dot-stroke: rgba(255,255,255,0.12);
}
[data-theme="light"] {
  --bg: #e8e8ee;
  --surface: rgba(0,0,0,0.02);
  --surface-border: rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text-dim: rgba(0,0,0,0.6);
  --canvas-bg: #f5f5fa;
  --btn-bg: rgba(0,0,0,0.06);
  --btn-hover: rgba(0,0,0,0.1);
  --circle-line: rgba(0,0,0,0.1);
  --diameter-line: rgba(0,0,0,0.06);
  --dot-stroke: rgba(0,0,0,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  display: flex; justify-content: center; align-items: center;
  background: var(--bg); transition: background .3s;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text); padding: 16px;
}
.container {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 24px 16px; border-radius: 20px;
  width: min(100%, 600px);
  background: var(--surface); transition: background .3s;
  border: 1px solid var(--surface-border);
}
h1 { font-size: clamp(1rem, 4vw, 1.3rem); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; opacity: .6; text-align: center; }
canvas {
  border-radius: 16px; display: block;
  background: var(--canvas-bg); transition: background .3s;
  box-shadow: 0 8px 32px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
  width: 100%; height: auto; aspect-ratio: 1/1;
}
.controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.controls button {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  font-size: 1.2rem; cursor: pointer; transition: all .2s;
  background: var(--btn-bg); transition: background .2s;
  color: var(--text); display: grid; place-items: center; user-select: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.controls button:hover { background: var(--btn-hover); transform: scale(1.05); }
.controls button:active { transform: scale(.92); }
.controls .label {
  font-size: .85rem; opacity: .7; white-space: nowrap; min-width: 60px; text-align: center;
}
.controls .btn-wide {
  width: auto; border-radius: 10px; padding: 0 14px; font-size: .85rem; gap: 4px;
}
@media (max-width: 480px) {
  .controls { gap: 6px; }
  .controls button { width: 36px; height: 36px; font-size: 1rem; }
  .controls .label { font-size: .75rem; min-width: 45px; }
}
</style>
</head>
<body>
<div class="container" role="application" aria-label="Visualización de puntos oscilando sobre diámetros">
  <h1>Puntos en Diámetros</h1>
  <canvas id="canvas" role="img" aria-label="Animación de puntos oscilando sobre diámetros de un círculo"></canvas>
  <div class="controls" role="toolbar" aria-label="Controles de la visualización">
    <button id="removeBtn" aria-label="Eliminar un punto">−</button>
    <span id="countDisplay" class="label" aria-live="polite">12 puntos</span>
    <span id="angleDisplay" class="label" aria-live="polite">Ángulo: 15°</span>
    <button id="addBtn" aria-label="Añadir un punto">+</button>

    <span style="width:1px;height:28px;background:var(--surface-border);display:inline-block;transition:background .3s"></span>

    <button id="slowerBtn" aria-label="Reducir velocidad">⟵</button>
    <span id="speedDisplay" class="label" aria-live="polite">Vel: 1.8</span>
    <button id="fasterBtn" aria-label="Aumentar velocidad">⟶</button>

    <span style="width:1px;height:28px;background:var(--surface-border);display:inline-block;transition:background .3s"></span>

    <button id="themeBtn" class="btn-wide" aria-label="Cambiar tema oscuro o claro">🌙</button>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
const W = 500;
const H = 500;

canvas.width = W * dpr;
canvas.height = H * dpr;
ctx.scale(dpr, dpr);

const CX = W / 2;
const CY = H / 2;
const CR = W * 0.44;

let N = 12;
const SPEED_LEVELS = [0.3, 0.6, 1.2, 1.8, 3.5, 7, 15, 30, 60];
let speedIdx = 3;

let dots = [];
let frame = 0;

function initDots() {
  dots = Array.from({ length: N }, (_, i) => ({
    angle: i === 0 ? 0 : i * Math.PI / N,
    hue: (i * 360) / N,
    prog: CR,
    dir: -1,
  }));
  frame = 0;
}
initDots();

function getColor(hue) { return `hsl(${hue}, 85%, 65%)`; }

function update() {
  frame++;
  const speed = SPEED_LEVELS[speedIdx];
  const stagger = Math.max(2, Math.round(12 / speed));
  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];
    if (frame <= i * stagger) continue;
    d.prog += speed * d.dir;
    if (d.prog >= CR) { d.prog = CR; d.dir = -1; }
    if (d.prog <= -CR) { d.prog = -CR; d.dir = 1; }
  }
}

function getCSSCustomProp(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  const circleColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.12)';
  const diamColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.07)';
  const dotStrokeColor = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.15)';

  ctx.beginPath();
  ctx.arc(CX, CY, CR, 0, Math.PI * 2);
  ctx.strokeStyle = circleColor;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  for (const d of dots) {
    ctx.beginPath();
    ctx.moveTo(
      CX + Math.cos(d.angle) * -CR,
      CY + Math.sin(d.angle) * -CR
    );
    ctx.lineTo(
      CX + Math.cos(d.angle) * CR,
      CY + Math.sin(d.angle) * CR
    );
    ctx.strokeStyle = diamColor;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  const R = Math.max(4, W * 0.012);
  const halfway = CR * 0.5;
  const stagger = Math.max(2, Math.round(12 / SPEED_LEVELS[speedIdx]));
  dots.forEach((d, i) => {
    if (frame <= i * stagger) return;
    const x = CX + Math.cos(d.angle) * d.prog;
    const y = CY + Math.sin(d.angle) * d.prog;

    const alpha = Math.min(1, Math.abs(d.prog) / halfway);
    const r = R * (0.6 + 0.4 * alpha);

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = getColor(d.hue);
    ctx.fill();
    ctx.strokeStyle = dotStrokeColor;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

document.getElementById('addBtn').addEventListener('click', () => {
  N++; initDots(); updateUI();
});
document.getElementById('removeBtn').addEventListener('click', () => {
  if (N > 2) { N--; initDots(); updateUI(); }
});
document.getElementById('fasterBtn').addEventListener('click', () => {
  if (speedIdx < SPEED_LEVELS.length - 1) { speedIdx++; updateUI(); }
});
document.getElementById('slowerBtn').addEventListener('click', () => {
  if (speedIdx > 0) { speedIdx--; updateUI(); }
});

function updateUI() {
  const angle = N > 1 ? (180 / N).toFixed(1) : '—';
  document.getElementById('countDisplay').textContent = `${N} ${N === 1 ? 'punto' : 'puntos'}`;
  document.getElementById('angleDisplay').textContent = `Ángulo: ${angle}°`;
  document.getElementById('speedDisplay').textContent = `Vel: ${SPEED_LEVELS[speedIdx].toFixed(1)}`;
}
updateUI();

const themeBtn = document.getElementById('themeBtn');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
}
const preferred = localStorage.getItem('theme') ||
  (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
setTheme(preferred);
themeBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
});
</script>
</body>
</html>
